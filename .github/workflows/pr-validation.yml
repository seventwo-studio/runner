---
name: Test Pull Request

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Dockerfile exists
        run: test -f Dockerfile

      - name: Validate version.txt exists
        run: test -f version.txt

  test-build:
    name: Test Build
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Test build image
        timeout-minutes: 15
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          platforms: linux/amd64
          tags: test-runner:test
          outputs: type=docker,dest=/tmp/runner-image.tar

      - name: Test run image
        timeout-minutes: 15
        run: |
          echo "Testing runner image..."

          timeout 300 docker load -i /tmp/runner-image.tar || {
            echo "ERROR: Docker load timed out after 5 minutes"
            exit 1
          }

          echo "Loaded images:"
          timeout 30 docker images --format "table {{.Repository}}:{{.Tag}}\t{{.ID}}\t{{.Size}}" || echo "Docker images command timed out"

          IMAGE_NAME=$(timeout 30 docker images --format "{{.Repository}}:{{.Tag}}" | grep test-runner | head -1)
          echo "Using image: $IMAGE_NAME"

          if [ -z "$IMAGE_NAME" ]; then
            echo "ERROR: Could not find expected image test-runner:test"
            exit 1
          fi

          timeout 60 docker run --rm "$IMAGE_NAME" echo "Image runs successfully" || {
            echo "ERROR: Basic docker run test timed out or failed"
            exit 1
          }
