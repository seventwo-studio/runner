---
name: Validate Pull Request

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Structure
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: test -f Dockerfile
      - run: test -f version.txt

  build:
    name: Build Image
    if: github.event.pull_request.draft == false
    needs: [validate]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          platforms: linux/amd64
          tags: runner:test
          outputs: type=docker,dest=/tmp/runner-image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: runner-image
          path: /tmp/runner-image.tar
          retention-days: 1

  test-toolchain:
    name: Test Toolchain
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: runner-image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/runner-image.tar

      - name: Run toolchain tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/.github/test-fixtures/toolchain:/workspace \
            -w /workspace \
            runner:test \
            bash ./test.sh

  test-playwright:
    name: Test Playwright
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: runner-image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/runner-image.tar

      - name: Run Playwright tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/.github/test-fixtures/playwright:/workspace \
            -w /workspace \
            -e CI=true \
            runner:test \
            bash ./test.sh
