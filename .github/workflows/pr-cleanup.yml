---
name: Cleanup PR Image

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  packages: write

jobs:
  cleanup:
    name: Delete PR Image
    runs-on: ubuntu-latest
    steps:
      - name: Sanitize image tag
        id: tag
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          RAW="pr-${PR_NUMBER}-${HEAD_REF}"
          SAFE=$(echo "$RAW" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g' | cut -c1-128)
          echo "tag=$SAFE" >> "$GITHUB_OUTPUT"

      - name: Delete PR image from GHCR
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.tag.outputs.tag }}';
            const org = 'seventwo-studio';
            const pkg = 'runner';

            const versions = await github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg({
              package_type: 'container',
              package_name: pkg,
              org,
              per_page: 100,
            });

            const version = versions.data.find(v =>
              v.metadata?.container?.tags?.includes(tag)
            );

            if (!version) {
              console.log(`No image found with tag: ${tag}`);
              return;
            }

            await github.rest.packages.deletePackageVersionForOrg({
              package_type: 'container',
              package_name: pkg,
              org,
              package_version_id: version.id,
            });

            console.log(`Deleted image ghcr.io/${org}/${pkg}:${tag} (version ${version.id})`);
