name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - name: Release Please
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          # Use a fine-grained PAT (contents:write, pull_requests:write) so
          # release-please's PRs trigger CI. Workflows started by GITHUB_TOKEN
          # cannot trigger further workflow runs, which would otherwise leave
          # release PRs without status checks and blocked by branch rules.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
