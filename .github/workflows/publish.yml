name: Publish Docker Image

on:
  workflow_dispatch:
  schedule:
    # Run nightly at 3am UTC
    - cron: "0 3 * * *"
  workflow_run:
    workflows: ["Release Please"]
    types: [completed]
    branches: [main]

jobs:
  publish:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free Disk Space
        uses: lucasilverentand/free-disk-space@44e06ae212258d5c39e5b5602256acd39a2bf002 # v1.0.0
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version
        id: version
        run: echo "version=$(cat version.txt | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/seventwo-studio/runner
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha

      - name: Build and Push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=ghcr.io/seventwo-studio/runner:buildcache
            type=registry,ref=ghcr.io/seventwo-studio/runner:latest
          cache-to: type=registry,ref=ghcr.io/seventwo-studio/runner:buildcache,mode=max

  test:
    name: Test Docker Image
    runs-on: ubuntu-latest
    needs: [publish]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull runner image
        run: docker pull ghcr.io/seventwo-studio/runner:latest

      - name: Run toolchain tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/.github/test-fixtures/toolchain:/workspace \
            -w /workspace \
            ghcr.io/seventwo-studio/runner:latest \
            bash ./test.sh

      - name: Run Playwright tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/.github/test-fixtures/playwright:/workspace \
            -w /workspace \
            -e CI=true \
            ghcr.io/seventwo-studio/runner:latest \
            bash ./test.sh

  test-expo:
    name: Test Docker Image (Expo + Maestro)
    runs-on: ubuntu-latest
    needs: [publish]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull runner image
        run: docker pull ghcr.io/seventwo-studio/runner:latest

      - name: Run Expo + Maestro integration tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/.github/test-fixtures/runner-expo:/workspace \
            -w /workspace \
            -e CI=true \
            ghcr.io/seventwo-studio/runner:latest \
            bash -c "chmod +x ./test-expo-runner.sh && ./test-expo-runner.sh"
