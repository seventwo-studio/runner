name: Publish Docker Image

on:
  workflow_dispatch:
  schedule:
    # Run nightly at 3am UTC
    - cron: "0 3 * * *"
  workflow_run:
    workflows: ["Release Please"]
    types: [completed]
    branches: [main]

jobs:
  publish:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version
        id: version
        run: echo "version=$(cat version.txt | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/seventwo-studio/runner
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=ghcr.io/seventwo-studio/runner:buildcache
            type=registry,ref=ghcr.io/seventwo-studio/runner:latest
          cache-to: type=registry,ref=ghcr.io/seventwo-studio/runner:buildcache,mode=max

  test:
    name: Test Docker Image
    runs-on: ubuntu-latest
    needs: [publish]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull runner image
        run: docker pull ghcr.io/seventwo-studio/runner:latest

      - name: Run integration tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/.github/test-fixtures/runner:/workspace \
            -w /workspace \
            -e CI=true \
            ghcr.io/seventwo-studio/runner:latest \
            bash -c "chmod +x ./test-runner.sh && ./test-runner.sh"

  test-expo:
    name: Test Docker Image (Expo + Maestro)
    runs-on: ubuntu-latest
    needs: [publish]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull runner image
        run: docker pull ghcr.io/seventwo-studio/runner:latest

      - name: Run Expo + Maestro integration tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/.github/test-fixtures/runner-expo:/workspace \
            -w /workspace \
            -e CI=true \
            ghcr.io/seventwo-studio/runner:latest \
            bash -c "chmod +x ./test-expo-runner.sh && ./test-expo-runner.sh"
